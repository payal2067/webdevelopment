<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forms</title>
  </head>
  <body>
     <center>
      <h1>📝 Form Assignment</h1>
    </center>

    <fieldset align="center">
      <legend><h2>Description</h2></legend>
      <p>
        This page shows Form assignment tasks and their links along with contact
        details.
      </p>
    </fieldset>
    <br />
    <h1>Registration Form</h1>
    <form>
      <div>
        <label for="firstname">First Name:</label>
        <input type="text" id="firstname" />
      </div>

      <br />

      <div>
        <label for="lastname">Last name :</label>
        <input type="text" id="lastname" />
      </div>

      <br />

      <div>
        <label for="Email">Email :</label>
        <input type="email" id="email" />
      </div>

      <br />

      <div>
        <label for="Password:">Password:</label>
        <input type="password" id="password" />
      </div>

      <br />

      <div>
        <span>Gender:</span><br />
        <span>
          <label for="male">Male</label>
          <input type="radio" id="male" name="gender" /><br />
        </span>
        <span>
          <label for="Female">Female</label>
          <input type="radio" id="Female" name="gender" /><br />
        </span>
        <span>
          <label for="other">Other</label>
          <input type="radio" id="other" name="gender" />
        </span>
      </div>

      <br/>

      <div>
         <label for="Age:">Age:</label>
        <input type="number" id="Age" />
      </div>

      <br/>
     
      <div>
         <span>Preferences:</span><br />
        <span>
          <label for="Acrylic Painting">Acrylic Painting </label>
          <input type="checkbox" id="Acrylic Painting" name="Preferences" /><br/><br/>
        </span>
        <span>
          <label for="Oil Painting">Oil Painting</label>
          <input type="checkbox" id="Oil Painting" name="Preferences" /></span><br/><br/>
        </span>
        <span>
          <label for="Water Color Painting">Water Color Painting</label>
          <input type="checkbox" id="Water Color Painting" name="Preferences" />
        </span>
      </div>

      <br/>

      <div>
        <select  name="Select Occupation">
            <option value="Student">Student</option>
            <option value="employee" >Employee</option>
        </select>
      </div>

      <br/>

      <div>
        <label for="bio">Bio</label>
        <textarea id="bio" rows="4" cols="30" placeholder="Share few lines about yourself..."></textarea>
      </div>

      <br/>

      <div>
         <input type="reset" value="reset">
         <input type="submit" value="submit">
      </div>
    </form>
     <br />
    <a href="../FormAssignment/subIndex.html">⬅ Back </a>
     <br /><br />
    <a href="../index.html">⬅ Back to Home</a>
  </body>
</html>
