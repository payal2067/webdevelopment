<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
     <center>
      <h1>📝 Form Assignment</h1>
    </center>

    <fieldset align="center">
      <legend><h2>Description</h2></legend>
      <p>
        This page shows Form assignment tasks and their links along with contact
        details.
      </p>
    </fieldset>
    <br />
    <h3>Task 4:</h3>

    <h1>Application Form</h1>

    <form>
      <label for="firstname">First Name:</label>
      <input type="text" id="firstname" />

      <label for="lastname">Last Name:</label>
      <input type="text" id="lastname" /><br /><br />

      <label for="date">Date of Birth:</label>
      <input type="date" id="date" />

      <span>Age:</span>
      <select name="Age" id="Age">
        <option value=" ">18</option>
        <option value="<18"><18</option>
      </select>

      <br /><br />

      <span>Gender:</span>
      <select name="Gender" id="Gender">
        <option value=" ">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
      </select>

      <label for="email">Email Address:</label>
      <input
        type="email"
        id="email"
        placeholder="Enter email address"
      /><br /><br />

      <div>
        <span>Positions Available:</span>

        <span>
          <label for="p1">Junior Developer</label>
          <input
            type="radio"
            name="positions available"
            value="junior developer"
            id="p1"
          />
        </span>

        <span>
          <label for="p2">Mid-level Developer</label>
          <input
            type="radio"
            name="positions available"
            value="mid-level developer"
            id="p1"
          />
        </span>

        <span>
          <label for="p3">Senior Dveloper</label>
          <input
            type="radio"
            name="positions available"
            value="senior developer"
            id="p3"
          />
        </span>
      </div>

      <br />

      <span>Programming Languages : </span>

      <label for="p1">Java</label>
      <input type="checkbox" id="p1" value="java" />

      <label for="p2">Java Script</label>
      <input type="checkbox" id="p2" value="java script" />

      <label for="p3">Python</label>
      <input type="checkbox" id="p3" value="python" />

      <br /><br />

      <label for="password">Password:</label>
      <input type="password" id="password" />

      <label for="confirm password">Confirm password:</label>
      <input type="password" id="password" />

      <br /><br />

      <button type="submit">Submit</button>

      <button type="reset">Reset</button>
    </form>

  </body>
