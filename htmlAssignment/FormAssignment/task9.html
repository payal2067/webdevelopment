 <!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
     <center>
      <h1>📝 Form Assignment</h1>
    </center>

    <fieldset align="center">
      <legend><h2>Description</h2></legend>
      <p>
        This page shows Form assignment tasks and their links along with contact
        details.
      </p>
    </fieldset>
    <br />
    <form>
      <h3><i>Pizza Order Form</i></h3>

      <i>
        <label for="firstname">First Name:</label>
        <input type="text" id="firstname" /> </i
      ><br /><br />

      <i>
        <label for="lastname">Last Name:</label>
        <input type="text" id="lastname" /> </i
      ><br /><br />

      <i>
        <label for="email">Email Address:</label>
        <input type="email" id="email" /> </i
      ><br /><br />

      <i>
        <label for="contact">Contact Number:</label>
        <input type="number" id="contact" /> </i
      ><br /><br />

      <i>
        <label for="date">Preferred Delivery date:</label>
        <input type="date" id="date" /> </i
      ><br /><br />

      <span>Size:</span>
      <span>
        <label for="S1">Small</label>
        <input type="radio" name="small" value="small" id="S1" />
      </span>

      <span>
        <label for="S2">Medium</label>
        <input type="radio" name="medium" value="medium" id="S2" />
      </span>

      <span>
        <label for="S3">Large</label>
        <input type="radio" name="large" id="S3" />
      </span>

      <p><b>Flavor:</b></p>

      <input type="checkbox" id="h1" name="flavor" value="hawaiian" />
      <label for="h1">Hawaiian (Php 150.00)</label>

      <select name="qty_hawaiian">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
      </select>

      <br /><br />

      <input type="checkbox" id="p1" name="flavor" value="pepperoni" />
      <label for="p1">Pepperoni (Php 140.00)</label>

      <select name="qty_pepperoni">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
      </select>

      <br /><br />

      <input type="checkbox" id="v1" name="flavor" value="vegetable" />
      <label for="v1">Vegetable (Php 130.00)</label>

      <select name="qty_vegetable">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option></select
      ><br /><br />

      <i>
        <label for="card number">Credit Card Number:</label>
        <input type="number" id="card number" /> </i
      ><br /><br />

      <i>
        <label for="pin">PIN:</label>
        <input type="number" id="pin" /> </i
      ><br /><br />

      <span>Additional Note:</span><br />
      <textarea name="Additional Note" id="Additional Note"></textarea
      ><br /><br />

      <button type="submit">Submit Order</button>
    </form>
     <br />
    <a href="../FormAssignment/subIndex.html">⬅ Back </a>
     <br /><br />
    <a href="../index.html">⬅ Back to Home</a>
  </body>
</html>
