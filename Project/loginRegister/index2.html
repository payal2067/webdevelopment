<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="bg-primary d-flex justify-content-center align-items-center pt-5 vh-100">
    <div
      class=" d-lg-grid align-items-end justify-content-center w-25 rounded-2 gap-4 bg-light "
    >
      <h1 >
        <span class="text-decoration-underline link-underline-primary">Lo</span
        >gin
      </h1>
      <div class=" d-flex justify-content-center gap-2  border-2 border-bottom w-100">
        <i class="bi bi-envelope"></i>
        <input
          type="email"
          name="email"
          id="name"
          placeholder="Enter your email "
          class="border-0 bg-light w-100"
        />
      </div>

      <div class="d-flex justify-content-center gap-2 border-2 border-bottom w-100 ">
        <i class="bi bi-lock"></i>
        <input
          type="password"
          name="password"
          id="password"
          placeholder="Confirm a password"
          class="border-0 bg-light w-100 "
        />
        <i class="bi bi-eye"></i>
      </div>

      <div class="d-flex gap-5">
        <label><input type="checkbox" /> Remember me</label>

        <a href="#">Forgot password?</a>
      </div>

      <div class=" d-flex justify-content-center  gap-1  w-100">
        <button class="bg-primary border rounded-2 p-2 text-light w-100">Login Now</button>
      </div>

      <div class=" d-flex w-100 justify-content-center gap-1">
        <p>Don't have an account?<a href="">Signup now</a></p>
      </div>
    </div>

    <!-- <script></script> -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
