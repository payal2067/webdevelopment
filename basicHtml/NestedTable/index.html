<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nested Table</title>
  </head>
  <body>
    <table border="2">
      <tr>
        <th>Name</th>
        <th>Details</th>
      </tr>

      <tr>
        <td>Aman</td>
        <td>
          <table border="1">
            <tr>
              <th>Subject</th>
              <th>Marks</th>
            </tr>
            <tr>
              <td>Math</td>
              <td>80</td>
            </tr>
            <tr>
              <td>Science</td>
              <td>90</td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
