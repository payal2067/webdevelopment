<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>colspan & rowspan</title>
  </head>
  <body>
    <table border="1">
      <tr>
        <th rowspan="2">Name</th>
        <th colspan="2">Marks</th>
      </tr>
      <tr>
        <td>Math</td>
        <td>Science</td>
      </tr>
      <tr>
        <td>Aman</td>
        <td>80</td>
        <td>90</td>
      </tr>
    </table>
  </body>
</html>
