<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caption Example</title>
  </head>
  <body>
    <table border="1">
      <caption>
        Student Data
      </caption>

      <tr>
        <th>Name</th>
        <th>Marks</th>
      </tr>

      <tr>
        <td>Amit</td>
        <td>85</td>
      </tr>
    </table>
  </body>
</html>
