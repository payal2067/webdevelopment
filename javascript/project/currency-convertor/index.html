<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Currency Converter</title>
  </head>

  <body class="">
    <header
      class="bg-warning position-sticky top-0 w-100 text-dark p-1 text-center"
    >
      <h2>Currency Convertor</h2>
    </header>

    <main class="position-relative  ">
     
       <img src="./currency.jpg" alt="" width="100%" class="img opacity-75">
     
       <div class="position-absolute top-0 ">
          <div class="row d-flex">
            <div class="col-md-5">
              <div class="small-card text-center">
                <img
                  src="https://flagsapi.com/US/flat/64.png"
                  alt=""
                  class="flag-img"
                  id="flag-1"
                />

                <select id="country" class="form-select form-select-lg">
                  <option value="usd,US">United States - USD</option>
                  <option value="inr,IN">India - INR</option>
                  <option value="gbp,GB">British - GBP</option>
                  <option value="usd,US">Australia - USD</option>
                  <option value="jpy,JP">Japan - JPY</option>
                </select>
              </div>
            </div>

            <div class="col-md-5">
              <div class="small-card text-center">
                <img
                  src="https://flagsapi.com/IN/flat/64.png"
                  alt=""
                  class="flag-img"
                  id="flag-2"
                />

                <select id="othercountry" class="form-select form-select-lg">
                  <option value="usd,US">United States - USD</option>
                  <option value="inr,IN">India - INR</option>
                  <option value="gbp,GB">British - GBP</option>
                  <option value="usd,US">Australia - USD</option>
                  <option value="jpy,JP">Japan - JPY</option>
                </select>
              </div>
            </div>
          </div>

          <div class="mt-4">
            <input
              type="number"
              id="Amount"
              class="form-control form-control-lg"
              placeholder="Enter Amount"
            />
          </div>

          <div class="mt-4 text-center">
            <button
              onclick="ConvertCurrency()"
              class="btn bg-info text-dark"
            >
              Convert
            </button>
          </div>

          <div class="result mt-4 text-black text-center">
            <h2 class="mb-2">
              Converted Amount
              <h1 class="result-text" id="result">₹ 0.00</h1>
            </h2>
          </div>
        </div>
    </main>

    <!-- <script></script> -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
