 <!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Age Caalculator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css"/>
  </head>
  <body>
    <div class="main">
      <form class="conatiner bg-white d-grid gap-4 p-5 rounded rounded-5">
        <div class="item1 d-grid gap-2">
          <h1 class="text-center text-capitalize">age calculator</h1>
          <label for="yourdob" class="text-center">Enter your Date of age</label>
          <input  type="date" name="yourdob" id="yourdob" class="form-control"/>
        </div>
        <div class="d-grid gap-2">
          <label for="currdate" class="text-center">Current Date</label>
          <input type="date" name="currdate" id="currdate" class="form-control" />
        </div>
        <div class="btn">
          <button class="btn bg-primary text-white" type="submit">Calculate</button>
        </div>
        <div class="fw-bold">
            Your age is : <span id="MyAge">xx</span> Year
        </div>
      </form>
    </div>

    <script src="./script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
