<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <title>Weather App</title>
  </head>
  <body class="bg-primary-subtle">
    <div class="position-relative">
      <img src="./weather.png" alt="" width="100% " class="img" />
    </div>

    <div
      class="container position-absolute bg-light shadow-lg p-3 weather-card text-center"
    >
      <h2 class="mb-4">🌦️ Weather App ⛅</h2>

      <input
        type="text"
        id="cityName"
        class="form-control mb-3 border-1"
        placeholder="Enter City Name"
      />

      <button class="btn btn-primary w-100 mb-4" onclick="getWeather()">
        Get Weather
      </button>


        <div class="bg-light p-3 rounded">
          <h5>Temperature</h5>
          <div><span id="Temperature">10</span>°C</div>
        </div>

        <div class="bg-light p-3 rounded">
          <h5>Wind</h5>
          <div><span id="Wind">10</span>km/h</div>
        </div>
     
        <div class="bg-light p-3 rounded">
        <h5>Pressure</h5>
        <div ><span id="Pressure">10</span>mb</div>
      </div>

      <div class="bg-light p-3 rounded">
        <h5>Clouds</h5>
        <div ><span id="Clouds">10</span>%</div>
      </div>


     
    </div>
    <script src="script.js"></script>
  </body>
</html>
