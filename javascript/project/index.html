 <!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Currency Converter</title>
  </head>

  <body>
   
    <div class="glass-card p-4">
      <div class="text-center mb-4">
        <h1 class="fw-bold">Currency Converter</h1>
        <p class="text-light">Live Exchange Rates</p>
      </div>

      <div class="row g-4 align-items-center">
        <div class="col-md-5">
          <div class="small-card text-center">
            <img
              id="flag1"
              class="flag-img mb-3"
              src="https://flagsapi.com/US/flat/64.png"
            />

            <select id="country1" class="form-select form-select-lg">
              <option value="usd,US">United States - USD</option>
              <option value="inr,IN">India - INR</option>
              <option value="eur,EU">Europe - EUR</option>
              <option value="gbp,GB">United Kingdom - GBP</option>
              <option value="jpy,JP">Japan - JPY</option>
            </select>
          </div>
        </div>

        <div class="col-md-2 text-center">
          <button class="swap-btn" onclick="swapCurrency()">
            <i class="bi bi-arrow-left-right"></i>
          </button>
        </div>

        <div class="col-md-5">
          <div class="small-card text-center">
            <img
              id="flag2"
              class="flag-img mb-3"
              src="https://flagsapi.com/IN/flat/64.png"
            />

            <select id="country2" class="form-select form-select-lg">
              <option value="inr,IN">India - INR</option>
              <option value="usd,US">United States - USD</option>
              <option value="eur,EU">Europe - EUR</option>
              <option value="gbp,GB">United Kingdom - GBP</option>
              <option value="jpy,JP">Japan - JPY</option>
            </select>
          </div>
        </div>
      </div>

      <div class="mt-4">
        <input
          type="number"
          id="amount"
          class="form-control form-control-lg"
          placeholder="Enter Amount"
        />
      </div>

      <div class="mt-4">
        <button
          onclick="convertCurrency()"
          class="btn btn-light w-100 convert-btn"
        >
          Convert Currency
        </button>
      </div>

      <div class="result-box mt-4 text-center">
        <p class="mb-2">Converted Amount</p>

        <h1 class="result-text" id="result">₹ 0.00</h1>

        <p id="rateText">1 USD = 83.50 INR</p>
      </div>
    </div>

    
    <!-- <script></script> -->
     <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
